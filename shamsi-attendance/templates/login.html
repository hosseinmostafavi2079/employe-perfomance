<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سامانه کارکرد شمسی</title>
    <link rel="stylesheet" href="/static/css/theme.css">
</head>
<body>
    <div class="atmosphere"></div>

    <div class="auth-shell">
        <div class="auth-card">
            <div class="scanline"></div>

            <div class="auth-mark">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M12 7v5l3.2 2"/>
                </svg>
            </div>

            <h1 class="auth-title">سامانهٔ کارکرد شمسی</h1>
            <p class="auth-sub">برای ثبت تردد و گزارش کارکرد، با کد پرسنلی و کلمهٔ عبور سازمانی خود وارد شوید.</p>

            {{if .Message}}
            <div class="auth-alert">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"/><path d="M12 8v5"/><path d="M12 16h.01"/>
                </svg>
                <span>{{.Message}}</span>
            </div>
            {{end}}

            <form action="/login" method="POST" class="form">
                <div class="field auth-field">
                    <label>کد پرسنلی / نام کاربری</label>
                    <input type="text" name="username" id="login-username" placeholder="مثلاً EMP-1001 یا ADMIN" required autocomplete="username">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="8" r="4.5"/>
                    </svg>
                </div>
                <div class="field auth-field">
                    <label>کلمهٔ عبور امن</label>
                    <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4.5" y="11" width="15" height="9.5" rx="2.2"/><path d="M8 11V7.5a4 4 0 0 1 8 0V11"/>
                    </svg>
                </div>
                <button type="submit" class="btn btn-primary" style="padding:13px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 5l6 7-6 7"/><path d="M20 12H4"/>
                    </svg>
                    ورود امن به پورتال
                </button>
                
                <button type="button" class="btn btn-soft" style="width: 100%; border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; margin-top: 10px;" onclick="loginWithBiometrics()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: 8px; vertical-align: middle;"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    ورود سریع با سنسور بیومتریک
                </button>
            </form>

            <div class="auth-footnote">
                <span>امروز: {{.CurrentDate}}</span>
                <i style="width:4px;height:4px;border-radius:50%;background:var(--text-faint);display:inline-block;"></i>
                <span>دسترسی رمزنگاری‌شده</span>
            </div>
        </div>
    </div>

    <script>
        // توابع تبدیل فرمت‌ها برای مرورگر
        const base64urlToBuffer = (b64) => {
            const padding = '='.repeat((4 - b64.length % 4) % 4);
            const base64 = (b64 + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) { outputArray[i] = rawData.charCodeAt(i); }
            return outputArray.buffer;
        };

        const bufferToBase64url = (buffer) => {
            const bytes = new Uint8Array(buffer);
            let str = '';
            for (let i = 0; i < bytes.length; i++) { str += String.fromCharCode(bytes[i]); }
            return window.btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        };

        // تابع لاگین با بیومتریک
        async function loginWithBiometrics() {
            const username = document.getElementById('login-username').value;
            if (!username) { alert("ابتدا نام کاربری (کد پرسنلی) خود را در کادر بالا وارد کنید."); return; }
            try {
                const resp = await fetch(`/biometric/login/begin?username=${encodeURIComponent(username)}`);
                if (!resp.ok) throw new Error('دستگاهی برای این نام کاربری ثبت نشده است.');
                const options = await resp.json();

                options.publicKey.challenge = base64urlToBuffer(options.publicKey.challenge);
                if (options.publicKey.allowCredentials) {
                    options.publicKey.allowCredentials.forEach(c => c.id = base64urlToBuffer(c.id));
                }

                const assertion = await navigator.credentials.get({ publicKey: options.publicKey });

                const finishResp = await fetch(`/biometric/login/finish?username=${encodeURIComponent(username)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: assertion.id,
                        rawId: bufferToBase64url(assertion.rawId),
                        type: assertion.type,
                        response: {
                            authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
                            clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
                            signature: bufferToBase64url(assertion.response.signature),
                            userHandle: assertion.response.userHandle ? bufferToBase64url(assertion.response.userHandle) : null
                        }
                    })
                });

                if (finishResp.ok) { window.location.href = '/'; } 
                else { alert('❌ احراز هویت ناموفق بود.'); }
            } catch (e) { console.error(e); alert('خطا: ' + e.message); }
        }
    </script>
    <script src="/static/js/app.js"></script>
</body>
</html>
